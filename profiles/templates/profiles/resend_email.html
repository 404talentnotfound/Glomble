{% extends 'videos/base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<title>Glomble | Resend email</title>
<div class="container mb-5">
	<div class="row justify-content-center">
		<div class="col-md-6 col-sm-12 col-xs-12">
			<form method="POST" enctype="multipart/form-data">
				{% csrf_token %}

        <div class="border-bottom mb-4 text-center">
          <legend>Resend email verification</legend>
          <p>Use this if you registered an account and lost or haven't received a verification email yet.</p>
        </div>

				{{ form | crispy }}
				<button class="btn btn-outline-info btn-block mt-3" type="submit">Submit</button>
			</form>
		</div>
	</div>
</div>
{% endblock %}
